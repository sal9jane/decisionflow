<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #ffffff;
      --black: #000000;
      --gray-1: #111111;
      --gray-2: #333333;
      --gray-3: #666666;
      --gray-4: #999999;
      --gray-5: #cccccc;
      --gray-6: #e5e5e5;
      --gray-7: #f5f5f5;
      --red: #ff0000;
      --sans: 'IBM Plex Sans', 'Noto Sans KR', 'Helvetica Neue', Arial, sans-serif;
      --serif: 'Noto Serif KR', Georgia, 'Times New Roman', serif;
      --mono: 'IBM Plex Mono', 'SF Mono', Consolas, monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
    }

    /* Navigation */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid var(--black);
    }

    .nav-brand {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .nav-step {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--gray-4);
    }

    .nav-step strong {
      color: var(--black);
      font-weight: 500;
    }

    /* Main */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 80px 40px 160px;
    }

    /* Steps — minimal underline tabs */
    .step-bar {
      display: flex;
      gap: 40px;
      border-bottom: 1px solid var(--gray-6);
      margin-bottom: 64px;
    }

    .step-tab {
      padding-bottom: 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-5);
      letter-spacing: 0.02em;
      position: relative;
      transition: color 0.2s;
    }

    .step-tab.active {
      color: var(--black);
    }

    .step-tab.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--black);
    }

    .step-tab.done { color: var(--gray-4); }

    /* Panels */
    .panel { display: none; }
    .panel.active {
      display: block;
      animation: enter 0.25s ease;
    }

    @keyframes enter {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Typography */
    .section-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-4);
      margin-bottom: 32px;
    }

    /* Input */
    .toggle-row {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
    }

    .toggle-btn {
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-5);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
      font-family: var(--sans);
    }

    .toggle-btn.active { color: var(--black); }

    /* Category selector */
    .category-row {
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .cat-btn {
      padding: 10px 20px;
      border: 1px solid var(--gray-6);
      background: var(--white);
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-3);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.12s;
    }

    .cat-btn:hover { border-color: var(--black); }

    .cat-btn.active {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    textarea {
      width: 100%;
      padding: 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--gray-6);
      color: var(--black);
      font-size: 18px;
      line-height: 1.8;
      resize: none;
      min-height: 140px;
      outline: none;
      font-family: var(--sans);
      transition: border-color 0.2s;
      padding-bottom: 16px;
    }

    textarea:focus { border-color: var(--black); }
    textarea::placeholder { color: var(--gray-5); }

    .url-input {
      width: 100%;
      padding: 0 0 16px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--gray-6);
      color: var(--black);
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus { border-color: var(--black); }
    .url-input::placeholder { color: var(--gray-5); }

    /* Buttons */
    .action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 32px;
    }

    .hint {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--gray-5);
    }

    .btn {
      padding: 12px 36px;
      background: var(--black);
      border: none;
      color: var(--white);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      cursor: pointer;
      font-family: var(--sans);
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.7; }
    .btn:disabled { opacity: 0.15; cursor: not-allowed; }

    .btn-outline {
      padding: 12px 24px;
      background: transparent;
      border: 1px solid var(--gray-6);
      color: var(--gray-3);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.15s;
    }

    .btn-outline:hover { border-color: var(--black); color: var(--black); }

    /* Loading */
    .loading { display: none; padding: 80px 0; text-align: center; }
    .loading.visible { display: block; }

    .loading-text {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--gray-4);
      animation: fade 1.5s ease-in-out infinite;
    }

    @keyframes fade {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* Error */
    .error {
      display: none;
      margin-top: 24px;
      font-size: 13px;
      color: var(--red);
      font-family: var(--mono);
    }
    .error.visible { display: block; }

    /* Structure result */
    .result-structure {
      padding: 64px 0;
      border-bottom: 1px solid var(--gray-6);
    }

    .r-label {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gray-4);
      margin-bottom: 32px;
    }

    .r-headline {
      font-family: var(--serif);
      font-size: 48px;
      font-weight: 900;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: var(--black);
      margin-bottom: 16px;
    }

    .r-sub {
      font-size: 18px;
      font-weight: 400;
      color: var(--gray-3);
      line-height: 1.65;
    }

    /* Strategy — table */
    .strategy-table {
      width: 100%;
      border-collapse: collapse;
    }

    .strategy-table tr {
      border-bottom: 1px solid var(--gray-6);
    }

    .strategy-table tr:last-child { border-bottom: none; }

    .strategy-table td {
      padding: 16px 0;
      font-size: 14px;
      vertical-align: top;
    }

    .strategy-table .key {
      width: 140px;
      font-weight: 500;
      color: var(--gray-4);
    }

    .strategy-table .val {
      font-weight: 500;
      color: var(--black);
    }

    .indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .indicator-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--black);
    }

    .dot-red { background: var(--red); }

    .reasoning-block {
      padding: 32px 0;
      border-top: 1px solid var(--gray-6);
      margin-top: 8px;
    }

    .reasoning-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray-4);
      margin-bottom: 12px;
    }

    .reasoning-body {
      font-size: 15px;
      color: var(--gray-3);
      line-height: 1.85;
    }

    /* Graphic options */
    .graphic-group {
      padding: 28px 0;
      border-bottom: 1px solid var(--gray-6);
    }

    .graphic-group:last-of-type { border-bottom: none; }

    .g-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--gray-4);
      margin-bottom: 16px;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .opt {
      padding: 10px 20px;
      border: 1px solid var(--gray-6);
      font-size: 14px;
      font-weight: 400;
      color: var(--gray-2);
      cursor: pointer;
      transition: all 0.12s;
      font-family: var(--sans);
      background: var(--white);
    }

    .opt:hover { border-color: var(--black); }

    .opt.selected {
      border-color: var(--black);
      background: var(--black);
      color: var(--white);
    }

    .opt-color {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .color-sq {
      width: 14px;
      height: 14px;
      border: 1px solid var(--gray-6);
    }

    .selected .color-sq { border-color: var(--gray-3); }

    .g-note {
      padding: 24px 0 0;
      font-size: 14px;
      color: var(--gray-4);
      line-height: 1.75;
    }

    /* Footer actions */
    .footer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-6);
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--gray-6);
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-3);
      cursor: pointer;
      font-family: var(--sans);
      transition: all 0.12s;
    }

    .copy-btn:hover { border-color: var(--black); color: var(--black); }
    .copy-btn.copied { border-color: var(--black); color: var(--black); }
    .copy-btn svg { width: 14px; height: 14px; }

    .reset-btn {
      font-size: 13px;
      color: var(--gray-4);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--sans);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .reset-btn:hover { color: var(--black); }

    @media (max-width: 640px) {
      .nav { padding: 20px 24px; }
      .main { padding: 48px 24px 120px; }
      .r-headline { font-size: 32px; }
      .step-bar { gap: 24px; }
      .result-structure { padding: 40px 0; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Decision Flow</div>
    <div class="nav-step" id="navStep"><strong>01</strong> / 03</div>
  </nav>

  <div class="main">
    <div class="step-bar">
      <span class="step-tab active" id="s1">Structure</span>
      <span class="step-tab" id="s2">Strategy</span>
      <span class="step-tab" id="s3">Graphic</span>
    </div>

    <!-- STEP 1 -->
    <div class="panel active" id="p1">
      <div class="section-title">Category</div>
      <div class="category-row">
        <button class="cat-btn active" onclick="switchCat(this,'branding')">Branding Notes</button>
        <button class="cat-btn" onclick="switchCat(this,'service')">Service &amp; Tech</button>
        <button class="cat-btn" onclick="switchCat(this,'communication')">Brand Communication</button>
      </div>
      <div class="section-title" style="margin-top:32px">Input</div>
      <div class="toggle-row">
        <button class="toggle-btn active" onclick="switchTab('text')">Text</button>
        <button class="toggle-btn" onclick="switchTab('url')">URL</button>
      </div>
      <div id="textInput">
        <textarea id="inputText" placeholder="분석할 텍스트를 입력하세요"></textarea>
      </div>
      <div id="urlInput" style="display:none;">
        <input type="url" id="inputUrl" class="url-input" placeholder="https://example.com/article">
      </div>
      <div class="action-row">
        <span class="hint">⌘ Enter</span>
        <button class="btn" id="convertBtn" onclick="runStep1()">Analyze</button>
      </div>
      <div class="loading" id="ld1"><span class="loading-text">Analyzing</span></div>
      <div class="error" id="e1"></div>
    </div>

    <!-- STEP 1 Result -->
    <div class="panel" id="p1r">
      <div class="result-structure">
        <div class="r-label" id="rL"></div>
        <div class="r-headline" id="rH"></div>
        <div class="r-sub" id="rS"></div>
      </div>
      <div class="action-row">
        <button class="btn-outline" onclick="go(1)">Back</button>
        <button class="btn" onclick="runStep2()">Next →</button>
      </div>
    </div>

    <!-- STEP 2 Loading -->
    <div class="panel" id="p2l">
      <div class="loading visible"><span class="loading-text">Building Strategy</span></div>
    </div>

    <!-- STEP 2 Result -->
    <div class="panel" id="p2r">
      <div class="section-title">Expression Strategy</div>
      <table class="strategy-table">
        <tr><td class="key">Language</td><td class="val" id="pL"></td></tr>
        <tr><td class="key">Emphasis</td><td class="val" id="pE"></td></tr>
        <tr><td class="key">Tone</td><td class="val" id="pT"></td></tr>
        <tr><td class="key">Readability</td><td class="val" id="pR"></td></tr>
        <tr><td class="key">Visual Weight</td><td class="val" id="pV"></td></tr>
      </table>
      <div class="reasoning-block">
        <div class="reasoning-label">Reasoning</div>
        <div class="reasoning-body" id="pRs"></div>
      </div>
      <div class="action-row">
        <button class="btn-outline" onclick="go(1,1)">Back</button>
        <button class="btn" onclick="runStep3()">Next →</button>
      </div>
    </div>

    <!-- STEP 3 Loading -->
    <div class="panel" id="p3l">
      <div class="loading visible"><span class="loading-text">Generating Options</span></div>
    </div>

    <!-- STEP 3 Result -->
    <div class="panel" id="p3r">
      <div class="section-title">Graphic Options</div>
      <div class="graphic-group">
        <div class="g-label">Color</div>
        <div class="options" id="gC"></div>
      </div>
      <div class="graphic-group">
        <div class="g-label">Layout</div>
        <div class="options" id="gL"></div>
      </div>
      <div class="graphic-group">
        <div class="g-label">Style</div>
        <div class="options" id="gS"></div>
      </div>
      <div class="g-note" id="gN"></div>

      <div class="footer-bar">
        <button class="copy-btn" onclick="copyAll(this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy All
        </button>
        <button class="reset-btn" onclick="resetAll()">Start Over</button>
      </div>
      <div class="action-row" style="margin-top:12px">
        <button class="btn-outline" onclick="go(2,1)">Back</button>
        <span></span>
      </div>
    </div>

    <div class="error" id="eG"></div>
  </div>

  <script>
    const API='https://api.groq.com/openai/v1/chat/completions',MDL='llama-3.3-70b-versatile';
    const _x=[48,18,31,60,45,85,37,43,32,2,33,95,24,44,46,45,56,31,127,9,69,2,20,3,35,36,12,24,38,86,37,48,36,43,41,0,47,40,95,57,87,81,70,81,56,49,39,91,32,13,20,86,87,0,36,60];
    const _p='WatchaDecisionFlow2024';
    const key=()=>_x.map((c,i)=>String.fromCharCode(c^_p.charCodeAt(i%_p.length))).join('');
    let tab='text',cat='branding',S={},T={},G={};

    function switchCat(btn,c){
      cat=c;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
    }

    const CAT_CONTEXT={
      branding:'WATCHA는 OTT/콘텐츠 플랫폼 브랜드입니다. 이 글은 브랜드 노트(Branding Notes) 카테고리로, 브랜드 철학·정체성·디자인 원칙 등 내부 관점의 이야기를 다룹니다. 톤은 내밀하고 사려 깊으며, WATCHA의 감성과 문화를 반영해야 합니다.',
      service:'WATCHA는 OTT/콘텐츠 플랫폼 브랜드입니다. 이 글은 서비스&테크(Service & Tech) 카테고리로, 제품 기능·기술 스택·데이터 분석 등을 다룹니다. 톤은 명확하고 전문적이며, 기술적 깊이와 접근성을 균형 있게 유지해야 합니다.',
      communication:'WATCHA는 OTT/콘텐츠 플랫폼 브랜드입니다. 이 글은 브랜드 커뮤니케이션(Brand Communication) 카테고리로, 캠페인·마케팅·대외 메시지 등을 다룹니다. 톤은 대담하고 임팩트 있으며, 외부 오디언스를 사로잡는 표현이어야 합니다.'
    };

    function switchTab(t){
      tab=t;
      document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
      document.querySelector(`.toggle-btn[onclick="switchTab('${t}')"]`).classList.add('active');
      document.getElementById('textInput').style.display=t==='text'?'block':'none';
      document.getElementById('urlInput').style.display=t==='url'?'block':'none';
    }

    async function fetchUrl(u){
      const r=await fetch(`https://r.jina.ai/${u}`,{headers:{Accept:'text/plain'}});
      if(!r.ok)throw new Error('URL error');
      return(await r.text()).slice(0,3000);
    }

    function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}

    function steps(n){
      ['s1','s2','s3'].forEach((id,i)=>{
        const el=document.getElementById(id);
        el.className='step-tab';
        if(i+1===n)el.classList.add('active');
        else if(i+1<n)el.classList.add('done');
      });
      document.getElementById('navStep').innerHTML=`<strong>0${n}</strong> / 03`;
    }

    function go(n,r){steps(n);if(n===1&&!r)show('p1');else if(n===1)show('p1r');else if(n===2)show('p2r');}

    async function ai(sys,usr){
      const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${key()}`},body:JSON.stringify({model:MDL,messages:[{role:'system',content:sys},{role:'user',content:usr}],temperature:0.7})});
      if(!r.ok){const e=await r.json().catch(()=>null);throw new Error(e?.error?.message||`Error ${r.status}`);}
      const d=await r.json();let c=d.choices[0].message.content.trim();const m=c.match(/```(?:json)?\s*([\s\S]*?)```/);if(m)c=m[1].trim();return JSON.parse(c);
    }

    function err(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('visible');}

    async function runStep1(){
      let text='';
      if(tab==='url'){
        const u=document.getElementById('inputUrl').value.trim();
        if(!u){err('e1','URL을 입력해주세요.');return;}
        document.getElementById('ld1').classList.add('visible');document.getElementById('e1').classList.remove('visible');
        try{text=await fetchUrl(u);}catch(e){err('e1','URL 불러오기 실패');document.getElementById('ld1').classList.remove('visible');return;}
      }else{text=document.getElementById('inputText').value.trim();}
      if(!text){err('e1','텍스트를 입력해주세요.');return;}

      document.getElementById('ld1').classList.add('visible');document.getElementById('e1').classList.remove('visible');document.getElementById('convertBtn').disabled=true;
      try{
        S=await ai(`${CAT_CONTEXT[cat]}\n\nDistill input into a blog cover design structure for WATCHA's tech blog. Output ONLY JSON: {"label":"ENGLISH UPPERCASE 1-3 words","headline":"Korean max 8 words punchy","sub":"Korean one sentence complements headline"}\nheadline extremely short. sub never repeats headline. The label, headline, sub should reflect WATCHA's brand voice — bold, culturally sharp, and audience-aware.\nExample: {"label":"WATCHA PEDIA","headline":"취향 아카이브","sub":"취향을 기록하고 발견하는 서비스"}`,text);
        document.getElementById('rL').textContent=S.label||'';
        document.getElementById('rH').textContent=S.headline||'';
        document.getElementById('rS').textContent=S.sub||'';
        steps(1);show('p1r');
      }catch(e){err('e1',e.message);}
      finally{document.getElementById('ld1').classList.remove('visible');document.getElementById('convertBtn').disabled=false;}
    }

    async function runStep2(){
      steps(2);show('p2l');
      try{
        T=await ai(`${CAT_CONTEXT[cat]}\n\nExpression strategist for WATCHA blog cover. Given structure, decide visual expression strategy. Consider WATCHA's design system: clean, bold typography, minimal graphic elements, and high contrast. Output ONLY JSON:\n{"primary_language":"ko/en/mix","emphasis":"label/headline/sub","tone":"information/emotion/blend","readability":"strong/medium/low","visual_weight":"text-centric/graphic-support/graphic-dominant","reasoning":"2-3 Korean sentences explaining the strategy in WATCHA brand context"}`,JSON.stringify(S));
        setIndicator('pL',T.primary_language);
        document.getElementById('pE').textContent=(T.emphasis||'').charAt(0).toUpperCase()+(T.emphasis||'').slice(1);
        setIndicator('pT',T.tone);
        setIndicator('pR',T.readability);
        const vm={'text-centric':'Text 중심','graphic-support':'Graphic 보조','graphic-dominant':'Graphic 강조'};
        document.getElementById('pV').textContent=vm[T.visual_weight]||T.visual_weight||'';
        document.getElementById('pRs').textContent=T.reasoning||'';
        show('p2r');
      }catch(e){err('eG',e.message);go(1,1);}
    }

    function setIndicator(id,val){
      const el=document.getElementById(id);
      const label=(val||'').charAt(0).toUpperCase()+(val||'').slice(1);
      el.innerHTML=`<span class="indicator"><span class="indicator-dot"></span>${label}</span>`;
    }

    async function runStep3(){
      steps(3);show('p3l');
      try{
        G=await ai(`${CAT_CONTEXT[cat]}\n\nGraphic advisor for WATCHA blog cover image. Given structure+strategy, suggest graphic options. Consider WATCHA's visual identity: bold colors, clean layouts, modern and minimal aesthetics. Color suggestions should work well with WATCHA's brand palette while being distinctive per category. Output ONLY JSON:\n{"colors":[{"name":"Korean","hex":"#hex"},{"name":"...","hex":"..."},{"name":"...","hex":"..."}],"layouts":["Korean 1","2","3"],"styles":["Korean 1","2","3"],"note":"1-2 Korean sentences with WATCHA brand-aware recommendation"}`,JSON.stringify({structure:S,strategy:T}));

        render('gC',G.colors||[],c=>{const d=document.createElement('div');d.className='opt opt-color';d.innerHTML=`<span class="color-sq" style="background:${c.hex}"></span>${c.name}`;d.onclick=()=>d.classList.toggle('selected');return d;});
        render('gL',G.layouts||[],l=>{const d=document.createElement('div');d.className='opt';d.textContent=l;d.onclick=()=>d.classList.toggle('selected');return d;});
        render('gS',G.styles||[],s=>{const d=document.createElement('div');d.className='opt';d.textContent=s;d.onclick=()=>d.classList.toggle('selected');return d;});
        document.getElementById('gN').textContent=G.note||'';
        show('p3r');
      }catch(e){err('eG',e.message);show('p2r');steps(2);}
    }

    function render(id,arr,fn){const el=document.getElementById(id);el.innerHTML='';arr.forEach(i=>el.appendChild(fn(i)));}

    function copyAll(btn){
      const t=[`[Structure]`,`label: ${S.label||''}`,`headline: ${S.headline||''}`,`sub: ${S.sub||''}`,'',`[Strategy]`,`language: ${T.primary_language||''}`,`emphasis: ${T.emphasis||''}`,`tone: ${T.tone||''}`,`readability: ${T.readability||''}`,`visual weight: ${T.visual_weight||''}`,`reasoning: ${T.reasoning||''}`,'',`[Graphic]`,`colors: ${(G.colors||[]).map(c=>c.name+' '+c.hex).join(', ')}`,`layouts: ${(G.layouts||[]).join(' / ')}`,`styles: ${(G.styles||[]).join(' / ')}`,`note: ${G.note||''}`].join('\n');
      navigator.clipboard.writeText(t);
      const o=btn.innerHTML;btn.textContent='✓ Copied';btn.classList.add('copied');
      setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('copied');},1500);
    }

    function resetAll(){S={};T={};G={};cat='branding';steps(1);show('p1');document.getElementById('inputText').value='';document.getElementById('inputUrl').value='';document.querySelectorAll('.cat-btn').forEach((b,i)=>{b.classList.toggle('active',i===0);});}

    const ta=document.getElementById('inputText');
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.max(140,ta.scrollHeight)+'px';});
    document.getElementById('inputText').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')runStep1();});
    document.getElementById('inputUrl').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')runStep1();});
  </script>
</body>
</html>
