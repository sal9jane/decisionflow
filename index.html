<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decision Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@700;900&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'WATCHA Sans OTF'; src:url('fonts/WATCHASans-ExtraBold.woff2') format('woff2'); font-weight:800; font-style:normal; font-display:swap; }
    :root { --white:#fff; --black:#000; --gray-2:#333; --gray-3:#666; --gray-4:#999; --gray-5:#ccc; --gray-6:#e5e5e5; --gray-7:#f5f5f5; --red:#f00;
      --sans:'IBM Plex Sans','Noto Sans KR','Helvetica Neue',Arial,sans-serif; --serif:'Noto Serif KR',Georgia,serif; --mono:'IBM Plex Mono','SF Mono',Consolas,monospace; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--sans); background:var(--white); color:var(--black); -webkit-font-smoothing:antialiased; }
    .nav { display:flex; align-items:center; justify-content:space-between; padding:24px 40px; border-bottom:1px solid var(--black); }
    .nav-brand { font-size:14px; font-weight:600; letter-spacing:.04em; }
    .nav-step { font-family:var(--mono); font-size:12px; color:var(--gray-4); }
    .nav-step strong { color:var(--black); font-weight:500; }
    .main { max-width:640px; margin:0 auto; padding:80px 40px 160px; }
    .step-bar { display:flex; gap:40px; border-bottom:1px solid var(--gray-6); margin-bottom:64px; }
    .step-tab { padding-bottom:14px; font-size:13px; font-weight:500; color:var(--gray-5); letter-spacing:.02em; position:relative; transition:color .2s; }
    .step-tab.active { color:var(--black); }
    .step-tab.active::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--black); }
    .step-tab.done { color:var(--gray-4); }
    .panel { display:none; } .panel.active { display:block; animation:enter .25s ease; }
    @keyframes enter { from{opacity:0} to{opacity:1} }
    .section-title { font-family:var(--mono); font-size:10px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--gray-4); margin-bottom:32px; }
    .toggle-row { display:flex; gap:24px; margin-bottom:24px; }
    .toggle-btn { background:none; border:none; font-size:13px; font-weight:500; color:var(--gray-5); cursor:pointer; padding:0; transition:color .15s; font-family:var(--sans); }
    .toggle-btn.active { color:var(--black); }
    .category-row { display:flex; gap:8px; margin-bottom:32px; flex-wrap:wrap; }
    .cat-btn { padding:10px 20px; border:1px solid var(--gray-6); background:var(--white); font-size:13px; font-weight:500; color:var(--gray-3); cursor:pointer; font-family:var(--sans); transition:all .12s; }
    .cat-btn:hover { border-color:var(--black); } .cat-btn.active { border-color:var(--black); background:var(--black); color:var(--white); }
    textarea { width:100%; padding:0 0 16px; background:transparent; border:none; border-bottom:1px solid var(--gray-6); color:var(--black); font-size:18px; line-height:1.8; resize:none; min-height:140px; outline:none; font-family:var(--sans); transition:border-color .2s; }
    textarea:focus { border-color:var(--black); } textarea::placeholder { color:var(--gray-5); }
    .url-input { width:100%; padding:0 0 16px; background:transparent; border:none; border-bottom:1px solid var(--gray-6); color:var(--black); font-family:var(--mono); font-size:14px; outline:none; transition:border-color .2s; }
    .url-input:focus { border-color:var(--black); } .url-input::placeholder { color:var(--gray-5); }
    .action-row { display:flex; align-items:center; justify-content:space-between; margin-top:32px; }
    .hint { font-family:var(--mono); font-size:11px; color:var(--gray-5); }
    .btn { padding:12px 36px; background:var(--black); border:none; color:var(--white); font-size:13px; font-weight:500; letter-spacing:.04em; cursor:pointer; font-family:var(--sans); transition:opacity .15s; }
    .btn:hover { opacity:.7; } .btn:disabled { opacity:.15; cursor:not-allowed; }
    .btn-outline { padding:12px 24px; background:transparent; border:1px solid var(--gray-6); color:var(--gray-3); font-size:13px; font-weight:500; cursor:pointer; font-family:var(--sans); transition:all .15s; }
    .btn-outline:hover { border-color:var(--black); color:var(--black); }
    .loading { display:none; padding:80px 0; text-align:center; } .loading.visible { display:block; }
    .loading-text { font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--gray-4); animation:fade 1.5s ease-in-out infinite; }
    @keyframes fade { 0%,100%{opacity:.3} 50%{opacity:1} }
    .error { display:none; margin-top:24px; font-size:13px; color:var(--red); font-family:var(--mono); } .error.visible { display:block; }
    .result-structure { padding:64px 0; border-bottom:1px solid var(--gray-6); }
    .r-label { font-family:var(--mono); font-size:11px; font-weight:500; letter-spacing:.16em; text-transform:uppercase; color:var(--gray-4); margin-bottom:32px; }
    .r-headline { font-family:var(--serif); font-size:48px; font-weight:900; line-height:1.15; letter-spacing:-.03em; color:var(--black); margin-bottom:16px; }
    .r-sub { font-size:18px; font-weight:400; color:var(--gray-3); line-height:1.65; }
    .preview-wrap { background:var(--gray-7); padding:12px; margin-bottom:24px; } .preview-wrap canvas { width:100%; height:auto; display:block; }
    .palette-bar { display:flex; gap:6px; margin-bottom:24px; }
    .pal-chip { display:flex; gap:3px; padding:8px 12px; border:2px solid var(--gray-6); cursor:pointer; transition:all .12s; align-items:center; }
    .pal-chip:hover { border-color:var(--gray-3); }
    .pal-chip.active { border-color:var(--black); }
    .pal-sq { width:20px; height:20px; border:1px solid rgba(0,0,0,.06); }
    .pal-label { font-size:12px; font-weight:500; color:var(--gray-3); margin-left:8px; white-space:nowrap; }
    .preview-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
    .footer-bar { display:flex; align-items:center; justify-content:space-between; margin-top:48px; padding-top:24px; border-top:1px solid var(--gray-6); }
    .copy-btn { display:inline-flex; align-items:center; gap:8px; background:none; border:1px solid var(--gray-6); padding:10px 20px; font-size:13px; font-weight:500; color:var(--gray-3); cursor:pointer; font-family:var(--sans); transition:all .12s; }
    .copy-btn:hover { border-color:var(--black); color:var(--black); } .copy-btn.copied { border-color:var(--black); color:var(--black); }
    .copy-btn svg { width:14px; height:14px; }
    .reset-btn { font-size:13px; color:var(--gray-4); background:none; border:none; cursor:pointer; font-family:var(--sans); text-decoration:underline; text-underline-offset:3px; }
    .reset-btn:hover { color:var(--black); }
    @media(max-width:640px){ .nav{padding:20px 24px} .main{padding:48px 24px 120px} .r-headline{font-size:32px} .step-bar{gap:24px} .result-structure{padding:40px 0} .palette-bar{flex-wrap:wrap} }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">Decision Flow</div>
    <div class="nav-step" id="navStep"><strong>01</strong> / 02</div>
  </nav>
  <div class="main">
    <div class="step-bar">
      <span class="step-tab active" id="s1">Structure</span>
      <span class="step-tab" id="s2">Preview</span>
    </div>

    <!-- STEP 1: Input -->
    <div class="panel active" id="p1">
      <div class="section-title">Category</div>
      <div class="category-row">
        <button class="cat-btn active" onclick="switchCat(this,'branding')">Branding Notes</button>
        <button class="cat-btn" onclick="switchCat(this,'service')">Service &amp; Tech</button>
        <button class="cat-btn" onclick="switchCat(this,'communication')">Brand Communication</button>
      </div>
      <div class="section-title" style="margin-top:32px">Input</div>
      <div class="toggle-row">
        <button class="toggle-btn active" onclick="switchTab('text')">Text</button>
        <button class="toggle-btn" onclick="switchTab('url')">URL</button>
      </div>
      <div id="textInput"><textarea id="inputText" placeholder="분석할 텍스트를 입력하세요"></textarea></div>
      <div id="urlInput" style="display:none"><input type="url" id="inputUrl" class="url-input" placeholder="https://example.com/article"></div>
      <div class="action-row"><span class="hint">⌘ Enter</span><button class="btn" id="convertBtn" onclick="runStep1()">Analyze</button></div>
      <div class="loading" id="ld1"><span class="loading-text">Analyzing</span></div>
      <div class="error" id="e1"></div>
    </div>

    <!-- STEP 1: Result -->
    <div class="panel" id="p1r">
      <div class="result-structure">
        <div class="r-label" id="rL"></div>
        <div class="r-headline" id="rH"></div>
        <div class="r-sub" id="rS"></div>
      </div>
      <div class="action-row"><button class="btn-outline" onclick="go(1)">Back</button><button class="btn" onclick="runPreview()">Preview →</button></div>
    </div>

    <!-- STEP 2: Preview Loading -->
    <div class="panel" id="p2l"><div class="loading visible"><span class="loading-text">Generating Preview</span></div></div>

    <!-- STEP 2: Preview Result -->
    <div class="panel" id="p2r">
      <div class="section-title">Cover Preview</div>
      <div class="preview-wrap"><canvas id="cvs"></canvas></div>
      <div class="palette-bar" id="palBar"></div>
      <div class="preview-toolbar">
        <button class="btn-outline" onclick="regenerate()">Regenerate</button>
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="dlPNG()">PNG</button>
          <button class="btn-outline" onclick="dlSVG()" style="border-color:var(--black);color:var(--black)">SVG</button>
        </div>
      </div>
      <div class="footer-bar" style="margin-top:24px">
        <button class="copy-btn" onclick="copyAll(this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy All</button>
        <button class="reset-btn" onclick="resetAll()">Start Over</button>
      </div>
      <div class="action-row" style="margin-top:12px"><button class="btn-outline" onclick="go(1,1)">Back</button><span></span></div>
    </div>
    <div class="error" id="eG"></div>
  </div>

  <script>
    const API='https://api.groq.com/openai/v1/chat/completions',MDL='llama-3.3-70b-versatile';
    const _x=[48,18,31,60,45,85,37,43,32,2,33,95,24,44,46,45,56,31,127,9,69,2,20,3,35,36,12,24,38,86,37,48,36,43,41,0,47,40,95,57,87,81,70,81,56,49,39,91,32,13,20,86,87,0,36,60];
    const _p='WatchaDecisionFlow2024';
    const key=()=>_x.map((c,i)=>String.fromCharCode(c^_p.charCodeAt(i%_p.length))).join('');

    const CAT_LABELS={branding:'Branding Notes',service:'Service & Tech',communication:'Brand Communication'};
    const CAT_CONTEXT={
      branding:'WATCHA는 OTT/콘텐츠 플랫폼 브랜드입니다. 이 글은 브랜드 노트(Branding Notes) 카테고리입니다.',
      service:'WATCHA는 OTT/콘텐츠 플랫폼 브랜드입니다. 이 글은 서비스&테크(Service & Tech) 카테고리입니다.',
      communication:'WATCHA는 OTT/콘텐츠 플랫폼 브랜드입니다. 이 글은 브랜드 커뮤니케이션(Brand Communication) 카테고리입니다.'
    };

    let tab='text',cat='branding',S={},T={},G={};
    let selectedPalette=null,patternSeed=0,currentPattern=[],currentTitleLines=[];

    function switchCat(btn,c){cat=c;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}
    function switchTab(t){tab=t;document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));document.querySelector(`.toggle-btn[onclick="switchTab('${t}')"]`).classList.add('active');document.getElementById('textInput').style.display=t==='text'?'block':'none';document.getElementById('urlInput').style.display=t==='url'?'block':'none';}
    function show(id){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
    function steps(n){['s1','s2'].forEach((id,i)=>{const el=document.getElementById(id);el.className='step-tab';if(i+1===n)el.classList.add('active');else if(i+1<n)el.classList.add('done');});document.getElementById('navStep').innerHTML=`<strong>0${n}</strong> / 02`;}
    function go(n,r){steps(n);if(n===1&&!r)show('p1');else if(n===1)show('p1r');}
    function err(id,msg){const e=document.getElementById(id);e.textContent=msg;e.classList.add('visible');}

    async function fetchUrl(u){const r=await fetch(`https://r.jina.ai/${u}`,{headers:{Accept:'text/plain'}});if(!r.ok)throw new Error('URL error');return(await r.text()).slice(0,3000);}
    async function ai(sys,usr){const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json',Authorization:`Bearer ${key()}`},body:JSON.stringify({model:MDL,messages:[{role:'system',content:sys},{role:'user',content:usr}],temperature:.7})});if(!r.ok){const e=await r.json().catch(()=>null);throw new Error(e?.error?.message||`Error ${r.status}`);}const d=await r.json();let c=d.choices[0].message.content.trim();const m=c.match(/```(?:json)?\s*([\s\S]*?)```/);if(m)c=m[1].trim();return JSON.parse(c);}

    /* ── Step 1: Structure ── */
    async function runStep1(){
      let text='';
      if(tab==='url'){const u=document.getElementById('inputUrl').value.trim();if(!u){err('e1','URL을 입력해주세요.');return;}document.getElementById('ld1').classList.add('visible');document.getElementById('e1').classList.remove('visible');try{text=await fetchUrl(u);}catch(e){err('e1','URL 불러오기 실패');document.getElementById('ld1').classList.remove('visible');return;}}else{text=document.getElementById('inputText').value.trim();}
      if(!text){err('e1','텍스트를 입력해주세요.');return;}
      document.getElementById('ld1').classList.add('visible');document.getElementById('e1').classList.remove('visible');document.getElementById('convertBtn').disabled=true;
      try{
        S=await ai(`${CAT_CONTEXT[cat]}\n\nDistill input into blog cover title for WATCHA's tech blog. The cover has 2 lines of text.\n\nOutput ONLY JSON:\n{"line1":"cover title LINE 1 — key concept, 1-4 words (Korean or English, whichever reads best for this content)","line2":"cover title LINE 2 — supporting detail, 1-4 words (Korean or English)","sub":"one sentence description for reference"}\n\nExamples:\n{"line1":"WATCHA PEDIA","line2":"취향 아카이브","sub":"취향을 기록하고 발견하는 서비스"}\n{"line1":"데이터 마이그레이션","line2":"시스템 구축","sub":"멀티 클라우드 환경에서의 데이터 이관"}\n{"line1":"Kubernetes-native","line2":"로그 플랫폼","sub":"클라우드 네이티브 로깅 시스템 구축기"}`,text);
        document.getElementById('rL').textContent=S.line1||'';
        document.getElementById('rH').textContent=S.line2||'';
        document.getElementById('rS').textContent=S.sub||'';
        steps(1);show('p1r');
      }catch(e){err('e1',e.message);}
      finally{document.getElementById('ld1').classList.remove('visible');document.getElementById('convertBtn').disabled=false;}
    }

    /* ── Step 2: Preview (strategy+palette+render) ── */
    async function runPreview(){
      steps(2);show('p2l');
      try{
        await document.fonts.load('800 144px "WATCHA Sans OTF"');
        T=await ai(`${CAT_CONTEXT[cat]}\n\nExpression strategist for WATCHA blog cover. Output ONLY JSON:\n{"primary_language":"ko/en/mix","emphasis":"line1/line2","tone":"information/emotion/blend","visual_weight":"text-centric/graphic-support/graphic-dominant"}`,JSON.stringify(S));
        G=await ai(`${CAT_CONTEXT[cat]}\n\nColor palette advisor for WATCHA blog cover (2500×850px). Suggest 3 color palettes.\n\nCOLOR STRATEGY — choose the best approach per palette:\n- Duo-tone: 2 bold colors (e.g., dark charcoal #3D3D3D + vivid teal #00BFA5)\n- Monochromatic: 2-3 tones of same hue (e.g., #D72660 + #FF387A + #FF7EB3)\n- Analogous: neighboring hues (e.g., navy #1B2E4B + blue #4A80C4 + sky #7CB5F0)\n\nRULES:\n- All colors must keep white (#FFFFFF) text highly readable\n- No muddy, gray, or desaturated colors\n- Consider the article topic for color mood\n- If only 2 colors needed, set accent2 same as accent1\n\nOutput ONLY JSON:\n{"palettes":[{"name":"Korean 2-3 words","base":"#hex","accent1":"#hex","accent2":"#hex"},{"name":"...","base":"#hex","accent1":"#hex","accent2":"#hex"},{"name":"...","base":"#hex","accent1":"#hex","accent2":"#hex"}],"note":"1-2 Korean sentences"}`,JSON.stringify({structure:S,strategy:T}));

        buildPaletteBar();
        selectedPalette=G.palettes?.[0]||{base:'#333',accent1:'#555',accent2:'#777'};
        renderCover();
        show('p2r');
      }catch(e){err('eG',e.message);go(1,1);}
    }

    function buildPaletteBar(){
      const bar=document.getElementById('palBar');bar.innerHTML='';
      (G.palettes||[]).forEach((p,i)=>{
        const chip=document.createElement('div');
        chip.className='pal-chip'+(i===0?' active':'');
        const unique=p.accent1!==p.accent2;
        chip.innerHTML=`<span class="pal-sq" style="background:${p.base}"></span><span class="pal-sq" style="background:${p.accent1}"></span>${unique?`<span class="pal-sq" style="background:${p.accent2}"></span>`:''}<span class="pal-label">${p.name}</span>`;
        chip.onclick=()=>{
          document.querySelectorAll('.pal-chip').forEach(c=>c.classList.remove('active'));
          chip.classList.add('active');
          selectedPalette=p;
          renderCover();
        };
        bar.appendChild(chip);
      });
    }

    /* ── Utilities ── */
    function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h+s.charCodeAt(i))|0;return h;}
    function mulberry32(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^(seed>>>15),1|seed);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
    function snap(v,g){return Math.round(v/g)*g;}

    /* ── Pattern: full-coverage 3-layer composition ── */
    function genPattern(seed,colors){
      const rand=mulberry32(seed);
      const[base,a1,a2]=colors;
      const pal=a1===a2?[base,a1]:[base,a1,a2];
      const shapes=[];
      const W=2500,H=850;

      // LAYER 1: Vertical columns — full canvas coverage, no gaps
      const nCols=3+Math.floor(rand()*3);
      let cx=-30;
      for(let i=0;i<nCols;i++){
        const cw=(W+60)/nCols+(rand()-.5)*200;
        shapes.push({type:'rect',x:Math.round(cx),y:-30,w:Math.round(cw+30),h:H+60,color:pal[i%pal.length],opacity:1});
        cx+=cw;
      }

      // LAYER 2: Large compositional shapes — intersect columns, create depth
      const types=['triangle','circle','diamond','rect'];
      const mainType=types[Math.floor(rand()*types.length)];
      const n2=7+Math.floor(rand()*5);
      for(let i=0;i<n2;i++){
        const sw=300+rand()*800,sh=250+rand()*600;
        const sx=-sw*.3+rand()*(W+sw*.3);
        const sy=-sh*.3+rand()*(H+sh*.3);
        shapes.push({type:rand()<.6?mainType:types[Math.floor(rand()*types.length)],
          x:Math.round(sx),y:Math.round(sy),w:Math.round(sw),h:Math.round(sh),
          color:pal[Math.floor(rand()*pal.length)],opacity:1});
      }

      // LAYER 3: Small accent shapes — visual rhythm
      const n3=3+Math.floor(rand()*4);
      for(let i=0;i<n3;i++){
        const sw=snap(50+rand()*180,50),sh=snap(50+rand()*180,50);
        shapes.push({type:rand()<.5?'circle':'diamond',
          x:snap(rand()*W,50),y:snap(rand()*H,50),w:sw,h:sh,
          color:pal[Math.floor(rand()*pal.length)],opacity:1});
      }
      return shapes;
    }

    function drawShape(ctx,s){ctx.globalAlpha=s.opacity;ctx.fillStyle=s.color;
      switch(s.type){case'rect':ctx.fillRect(s.x,s.y,s.w,s.h);break;
      case'triangle':ctx.beginPath();ctx.moveTo(s.x+s.w/2,s.y);ctx.lineTo(s.x+s.w,s.y+s.h);ctx.lineTo(s.x,s.y+s.h);ctx.closePath();ctx.fill();break;
      case'circle':ctx.beginPath();ctx.arc(s.x+s.w/2,s.y+s.h/2,Math.min(s.w,s.h)/2,0,Math.PI*2);ctx.fill();break;
      case'diamond':ctx.beginPath();ctx.moveTo(s.x+s.w/2,s.y);ctx.lineTo(s.x+s.w,s.y+s.h/2);ctx.lineTo(s.x+s.w/2,s.y+s.h);ctx.lineTo(s.x,s.y+s.h/2);ctx.closePath();ctx.fill();break;}}

    function shapeToSVG(s){const o=`opacity="${s.opacity}"`,f=`fill="${s.color}"`;
      switch(s.type){case'rect':return`<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" ${f} ${o}/>`;
      case'triangle':return`<polygon points="${s.x+s.w/2},${s.y} ${s.x+s.w},${s.y+s.h} ${s.x},${s.y+s.h}" ${f} ${o}/>`;
      case'circle':{const r=Math.min(s.w,s.h)/2;return`<circle cx="${s.x+s.w/2}" cy="${s.y+s.h/2}" r="${r}" ${f} ${o}/>`;}
      case'diamond':return`<polygon points="${s.x+s.w/2},${s.y} ${s.x+s.w},${s.y+s.h/2} ${s.x+s.w/2},${s.y+s.h} ${s.x},${s.y+s.h/2}" ${f} ${o}/>`;
      default:return`<rect x="${s.x}" y="${s.y}" width="${s.w}" height="${s.h}" ${f} ${o}/>`;}
    }

    /* ── Text ── */
    function wrapText(ctx,text,maxW){const ps=text.split('\n'),lines=[];for(const p of ps){if(!p.trim()){lines.push('');continue;}const ws=p.split(/\s+/).filter(w=>w);let c=ws[0]||'';for(let i=1;i<ws.length;i++){const t=c+' '+ws[i];if(ctx.measureText(t).width>maxW){lines.push(c);c=ws[i];}else c=t;}if(c)lines.push(c);}return lines;}
    function forceTwoLines(ctx,text,maxW){let lines=wrapText(ctx,text,maxW);if(lines.length===1){const ws=lines[0].split(/\s+/);if(ws.length>=2){const m=Math.ceil(ws.length/2);lines=[ws.slice(0,m).join(' '),ws.slice(m).join(' ')];}else{const m=Math.ceil(text.length/2);lines=[text.slice(0,m),text.slice(mid)];}}if(lines.length>2)lines=[lines[0],lines.slice(1).join(' ')];return lines;}
    function buildCoverTitle(){const l1=S.line1||'',l2=S.line2||'';if(l1&&l2)return l1+'\n'+l2;return l1||l2;}

    /* ── Render ── */
    function renderCover(){
      const canvas=document.getElementById('cvs'),ctx=canvas.getContext('2d');
      canvas.width=2500;canvas.height=850;
      const pal=selectedPalette||{base:'#333',accent1:'#555',accent2:'#777'};
      const colors=[pal.base,pal.accent1,pal.accent2];
      ctx.fillStyle=pal.base;ctx.fillRect(0,0,2500,850);
      const seed=hashStr((S.line1||'')+(S.line2||'')+patternSeed);
      currentPattern=genPattern(seed,colors);
      for(const s of currentPattern)drawShape(ctx,s);
      ctx.globalAlpha=1;
      ctx.fillStyle='#FFFFFF';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.font='800 80px "WATCHA Sans OTF"';if('letterSpacing' in ctx)ctx.letterSpacing='-1px';
      ctx.fillText(CAT_LABELS[cat],1250,165);
      ctx.font='800 144px "WATCHA Sans OTF"';if('letterSpacing' in ctx)ctx.letterSpacing='-4px';
      const title=buildCoverTitle();
      currentTitleLines=title.includes('\n')?title.split('\n').slice(0,2):forceTwoLines(ctx,title,1197);
      currentTitleLines.forEach((line,i)=>ctx.fillText(line,1250,305+i*175));
      if('letterSpacing' in ctx)ctx.letterSpacing='0px';
    }

    function regenerate(){patternSeed++;renderCover();}

    /* ── Downloads ── */
    function dlPNG(){const c=document.getElementById('cvs'),a=document.createElement('a');a.download=((S.line1||'cover')+'_'+(S.line2||'')).replace(/\s+/g,'_')+'.png';a.href=c.toDataURL('image/png');a.click();}
    function escX(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
    function dlSVG(){
      const pal=selectedPalette||{base:'#333',accent1:'#555',accent2:'#777'};
      let s=`<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2500 850" width="2500" height="850">\n<rect width="2500" height="850" fill="${pal.base}"/>\n`;
      for(const sh of currentPattern)s+=shapeToSVG(sh)+'\n';
      s+=`<text x="1250" y="215" text-anchor="middle" font-family="WATCHA Sans OTF" font-weight="800" font-size="80" letter-spacing="-1" fill="#FFFFFF">${escX(CAT_LABELS[cat])}</text>\n`;
      currentTitleLines.forEach((line,i)=>{s+=`<text x="1250" y="${420+i*175}" text-anchor="middle" font-family="WATCHA Sans OTF" font-weight="800" font-size="144" letter-spacing="-4" fill="#FFFFFF">${escX(line)}</text>\n`;});
      s+='</svg>';const a=document.createElement('a');a.download=((S.line1||'cover')+'_'+(S.line2||'')).replace(/\s+/g,'_')+'.svg';a.href=URL.createObjectURL(new Blob([s],{type:'image/svg+xml'}));a.click();
    }

    function copyAll(btn){
      const pal=selectedPalette||{};
      const t=[`[Cover]`,`line1: ${S.line1||''}`,`line2: ${S.line2||''}`,`category: ${CAT_LABELS[cat]}`,``,`[Palette]`,`name: ${pal.name||''}`,`base: ${pal.base||''}`,`accent1: ${pal.accent1||''}`,`accent2: ${pal.accent2||''}`].join('\n');
      navigator.clipboard.writeText(t);const o=btn.innerHTML;btn.textContent='✓ Copied';btn.classList.add('copied');
      setTimeout(()=>{btn.innerHTML=o;btn.classList.remove('copied');},1500);
    }

    function resetAll(){S={};T={};G={};cat='branding';selectedPalette=null;patternSeed=0;currentPattern=[];currentTitleLines=[];steps(1);show('p1');document.getElementById('inputText').value='';document.getElementById('inputUrl').value='';document.querySelectorAll('.cat-btn').forEach((b,i)=>b.classList.toggle('active',i===0));}

    const ta=document.getElementById('inputText');
    ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=Math.max(140,ta.scrollHeight)+'px';});
    document.getElementById('inputText').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')runStep1();});
    document.getElementById('inputUrl').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')runStep1();});
  </script>
</body>
</html>
